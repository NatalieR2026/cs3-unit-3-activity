<!DOCTYPE html>
<html>
<head>
    <title>Add Matcha Place</title>
</head>

<body>
    <h1>Add New Matcha Place</h1>

    <form method="POST">
        <input type="text" name="name" placeholder="Cafe Name" required><br><br>
        <input type="text" name="order" placeholder="What you ordered" required><br><br>
        <input type="number" step="0.1" name="rating" placeholder="Rating (1-10)" required><br><br>
        <input type="text" name="location" placeholder="Location" required><br><br>
        <input type="submit" value="Add Place">
    </form>

    <br>
    <a href="/"><button>Back</button></a>

</body>
</html>
